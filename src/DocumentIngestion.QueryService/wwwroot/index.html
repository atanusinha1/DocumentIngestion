<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Q&A</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    header span {
      font-size: 12px;
      color: #666;
      background: #1e1e2e;
      padding: 3px 8px;
      border-radius: 4px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message { display: flex; flex-direction: column; gap: 8px; max-width: 800px; }
    .message.user  { align-self: flex-end; align-items: flex-end; }
    .message.bot   { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .user  .bubble { background: #2563eb; color: #fff; border-radius: 12px 12px 2px 12px; }
    .bot   .bubble { background: #1e1e2e; color: #e8e8e8; border-radius: 12px 12px 12px 2px; border: 1px solid #2a2a3a; }

    .sources {
      font-size: 12px;
      color: #888;
      padding: 0 4px;
    }

    .source-item {
      background: #13131f;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 6px;
      cursor: pointer;
    }

    .source-item:hover { border-color: #444; }

    .source-title { font-weight: 600; color: #aaa; font-size: 11px; }
    .source-text  { color: #666; font-size: 11px; margin-top: 2px; }
    .source-score { color: #4ade80; font-size: 10px; float: right; }

    .timing {
      font-size: 11px;
      color: #444;
      padding: 0 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #1e1e2e;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      width: fit-content;
    }

    .dot {
      width: 6px; height: 6px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); background: #2563eb; }
    }

    #input-row {
      padding: 16px 24px;
      border-top: 1px solid #2a2a3a;
      display: flex;
      gap: 10px;
    }

    #question {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.5;
    }

    #question:focus { border-color: #2563eb; }

    #question::placeholder { color: #444; }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      white-space: nowrap;
    }

    button:hover   { background: #1d4ed8; }
    button:disabled{ background: #1e2a4a; color: #444; cursor: not-allowed; }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #333;
    }

    .empty h2  { font-size: 20px; color: #444; }
    .empty p   { font-size: 13px; }
  </style>
</head>
<body>

<header>
  <h1>Document Q&amp;A</h1>
  <span>nomic-embed-text + mistral + Qdrant</span>
</header>

<div id="chat">
  <div class="empty" id="empty">
    <h2>Ask anything about your documents</h2>
    <p>Powered by Ollama (local) · No data leaves your Mac</p>
  </div>
</div>

<div id="input-row">
  <textarea
    id="question"
    rows="1"
    placeholder="Ask a question about your documents..."
    onkeydown="handleKey(event)"
  ></textarea>
  <button id="ask-btn" onclick="ask()">Ask</button>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('question');
  const btn     = document.getElementById('ask-btn');
  const empty   = document.getElementById('empty');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      ask();
    }
  }

  async function ask() {
    const question = input.value.trim();
    if (!question) return;

    empty.style.display = 'none';
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    // Show user message
    appendMessage('user', question);

    // Show typing indicator
    const typingEl = appendTyping();

    try {
      const res = await fetch('/api/query', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ question })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Query failed');
      }

      const data = await res.json();
      typingEl.remove();

      appendBotMessage(data);

    } catch (err) {
      typingEl.remove();
      appendMessage('bot', `❌ Error: ${err.message}`);
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function appendBotMessage(data) {
    const div = document.createElement('div');
    div.className = 'message bot';

    const sources = data.sources.length > 0
      ? `<div class="sources">
          <strong>Sources (${data.sources.length})</strong>
          ${data.sources.map((s, i) => `
            <div class="source-item">
              <span class="source-score">${(s.score * 100).toFixed(0)}% match</span>
              <div class="source-title">[Source ${i+1}] ${escapeHtml(s.title || s.source || 'Document')}</div>
              <div class="source-text">${escapeHtml(s.text.substring(0, 120))}...</div>
            </div>
          `).join('')}
        </div>`
      : '<div class="sources">No matching documents found in the collection.</div>';

    div.innerHTML = `
      <div class="bubble">${escapeHtml(data.answer)}</div>
      ${sources}
      <div class="timing">
        ⚡ embed ${data.embedMs}ms · search ${data.searchMs}ms · llm ${data.llmMs}ms
      </div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function appendTyping() {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
