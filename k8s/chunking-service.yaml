apiVersion: apps/v1
kind: Deployment
metadata:
  name: chunking-service
  labels:
    app: chunking-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chunking-service
  template:
    metadata:
      labels:
        app: chunking-service
    spec:
      containers:
        - name: chunking-service
          image: yourregistry.azurecr.io/chunking-service:latest
          env:
            - name: ServiceBus__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: servicebus-secret
                  key: connectionString
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chunking-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chunking-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: External
      external:
        metric:
          name: azure_servicebus_active_message_count
          selector:
            matchLabels:
              queue: document-ingested
        target:
          type:         AverageValue
          averageValue: "100"   # scale up when >100 messages per pod